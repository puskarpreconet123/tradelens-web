version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:80"
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/tradelens}
      - DB_NAME=tradelens
      - JWT_SECRET=dev-secret-key-123
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      - mongodb

  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npx serve -s public -l 3000"
    depends_on:
      - backend

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
